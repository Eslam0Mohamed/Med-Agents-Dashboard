<div class="patients-page">

  <div class="page-header">
    <h2>Patients</h2>
    <button class="btn-add" (click)="goToAdd()">+ Add Patient</button>
  </div>

  <div class="loading" *ngIf="isLoading">Loading...</div>
  <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="empty" *ngIf="!isLoading && patients.length === 0">
    No patients found. Add your first patient!
  </div>

  <table class="patients-table" *ngIf="!isLoading && patients.length > 0">
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Blood Type</th>
        <th>Allergies</th>
        <th>Chronic Conditions</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let patient of patients">
        <td>{{ patient.name }}</td>
        <td>{{ calculateAge(patient.dateOfBirth) }}</td>
        <td>
          <span class="badge" [class.male]="patient.gender === 'male'" [class.female]="patient.gender === 'female'">
            {{ patient.gender }}
          </span>
        </td>
        <td><span class="blood-type">{{ patient.bloodType }}</span></td>
        <td>
          <span class="tag" *ngFor="let allergy of patient.allergies">{{ allergy }}</span>
          <span *ngIf="!patient.allergies || patient.allergies.length === 0">—</span>
        </td>
        <td>
          <span class="tag" *ngFor="let condition of patient.chronicConditions">{{ condition }}</span>
          <span *ngIf="!patient.chronicConditions || patient.chronicConditions.length === 0">—</span>
        </td>
        <td>
          <div class="actions">
            <button class="btn-edit" (click)="goToEdit(patient._id!)">Edit</button>
            <button class="btn-delete" (click)="deletePatient(patient._id!)">Delete</button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

</div>
